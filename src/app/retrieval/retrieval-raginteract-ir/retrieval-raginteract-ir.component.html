<div class="page-shell">
  <app-header-menu></app-header-menu>

  <div class="container-fluid main-panel">
    <div class="app-shell">
      <!-- <header class="app-header">
        <div class="brand">Interact Image Retrieval</div>
      </header> -->

      <main class="app-main">
        <!-- LEFT: Chat -->
        <section class="chat-panel">
          <div class="chat-header">
            <div class="title">Chat</div>
            <button class="btn" type="button" (click)="onNewChat()">New</button>
          </div>

          <div class="chat-body" #chatBody>
            <div class="msg" *ngFor="let m of messages; trackBy: trackById" [class.user]="m.role === 'user'"
              [class.assistant]="m.role === 'assistant'">
              <div class="bubble">
                <!-- normal text -->
                <ng-container *ngIf="!m.triplets?.length && !m.suggestions?.length">
                  {{ m.content }}
                </ng-container>

                <!-- Extracted triplets -->
                <ng-container *ngIf="m.triplets?.length">
                  <div class="triplet-title">Extracted triplets (editable)</div>

                  <div class="triplet-row" *ngFor="let t of m.triplets; let i = index">
                    <input class="triplet-input" [(ngModel)]="t.subject" name="sub-{{ m.id }}-{{ i }}"
                      placeholder="subject" />
                    <input class="triplet-input" [(ngModel)]="t.relation" name="rel-{{ m.id }}-{{ i }}"
                      placeholder="relation" />
                    <input class="triplet-input" [(ngModel)]="t.object" name="obj-{{ m.id }}-{{ i }}"
                      placeholder="object" />

                    <button class="icon-btn danger" type="button" (click)="removeTriplet(m, i)">
                      🗑
                    </button>
                  </div>

                  <div class="triplet-actions">
                    <button class="btn" type="button" (click)="addTriplet(m)">+ Add</button>
                    <button class="btn primary" type="button" (click)="applyTriplets(m)">
                      Apply / Search
                    </button>
                  </div>
                </ng-container>

                <!-- Suggestions -->
                <ng-container *ngIf="m.suggestions?.length">
                  <div class="triplet-title">Suggestions</div>

                  <div class="suggest-card" *ngFor="let s of m.suggestions; let sIdx = index">
                    <div class="suggest-readonly">
                      <div class="suggest-field">
                        <div class="suggest-label">Suggestion</div>
                        <div class="suggest-text">{{ s.sug }}</div>
                      </div>

                      <!-- <div class="suggest-field">
                        <div class="suggest-label">Explanation</div>
                        <div class="suggest-text">{{ s.explain }}</div>
                      </div> -->
                    </div>

                    <div class="triplet-title">Suggestion triplets</div>

                    <div class="triplet-row readonly-row" *ngFor="let t of s.triplets; let tIdx = index">
                      <input class="triplet-input" [ngModel]="t.subject" name="ssub-{{ m.id }}-{{ sIdx }}-{{ tIdx }}"
                        placeholder="subject" readonly />
                      <input class="triplet-input" [ngModel]="t.relation" name="srel-{{ m.id }}-{{ sIdx }}-{{ tIdx }}"
                        placeholder="relation" readonly />
                      <input class="triplet-input" [ngModel]="t.object" name="sobj-{{ m.id }}-{{ sIdx }}-{{ tIdx }}"
                        placeholder="object" readonly />
                    </div>

                    <div class="triplet-actions">
                      <button class="btn primary" type="button" (click)="acceptSuggestion(m, sIdx)"
                        [disabled]="s.accepted">
                        {{ s.accepted ? 'Accepted' : 'Accept' }}
                      </button>
                    </div>
                  </div>
                </ng-container>
              </div>
            </div>

            <!-- loading bubble -->
            <div class="msg assistant" *ngIf="isSending">
              <div class="bubble loading-bubble">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
              </div>
            </div>
          </div>

          <form class="chat-input" (submit)="$event.preventDefault(); onSend()">
            <input type="text" [(ngModel)]="inputText" name="chatInput" placeholder="Type your query..."
              autocomplete="off" />
            <button class="btn primary" type="submit" [disabled]="!inputText.trim()">
              Send
            </button>
          </form>
        </section>

        <!-- RIGHT: Results -->
        <section class="results-panel">
          <div class="results-header">
            <div class="title">Results</div>
            <div class="tools">
              <input class="search" type="text" placeholder="Filter results..." />

              <select class="select" [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)">
                <option [ngValue]="8">8 / page</option>
                <option [ngValue]="12">12 / page</option>
                <option [ngValue]="20">20 / page</option>
              </select>
            </div>
          </div>

          <div class="results-grid">
            <article class="card" *ngFor="let imageUrl of pagedImageUrls; let i = index">
              <div class="thumb image-wrapper">
                <img [src]="apiRoot + 'media/' + imageUrl"
                  [alt]="'Result image ' + ((currentPage - 1) * pageSize + i + 1)" class="result-image" />
              </div>
              <div class="meta">
                <div class="rank">{{ pagedCaptionRev[i] }}</div>
              </div>
            </article>
          </div>

          <div class="pagination" *ngIf="imageUrls.length > 0">
            <button class="btn" type="button" (click)="prevPage()" [disabled]="currentPage === 1">
              Prev
            </button>

            <button class="btn" type="button" *ngFor="let page of pageNumbers" (click)="goToPage(page)"
              [class.primary]="page === currentPage">
              {{ page }}
            </button>

            <button class="btn" type="button" (click)="nextPage()" [disabled]="currentPage === totalPages">
              Next
            </button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- <app-footer-menu></app-footer-menu> -->
</div>
